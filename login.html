<input id="phone" placeholder="+380..." />
<button onclick="send()">Отримати код</button>

<input id="code" placeholder="код" />
<button onclick="verify()">Увійти</button>

<script>
async function send() {
  await fetch("/api/request-code", {
    method: "POST",
    body: JSON.stringify({
      phone: document.getElementById("phone").value
    })
  });
}

async function verify() {
  const res = await fetch("/api/verify", {
    method: "POST",
    body: JSON.stringify({
      phone: document.getElementById("phone").value,
      code: document.getElementById("code").value
    })
  });

  const data = await res.json();

  if (data.session) {
    document.cookie = "session=" + data.session;
    location.href = "/";
  }
}
</script>
